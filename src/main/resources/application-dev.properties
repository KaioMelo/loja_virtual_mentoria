# ===================================================================
# CONFIGURAÇÃO DO BANCO DE DADOS (POSTGRESQL)
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/loja_virtual_mentoria
spring.datasource.username=postgres
spring.datasource.password=56571998
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURAÇÃO DO POOL DE CONEXÕES (HIKARICP)
# ===================================================================
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.pool-name=PoolHikari
# Ajustado para não estourar o limite padrão (100) do PostgreSQL local
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.auto-commit=true

# ===================================================================
# CONFIGURAÇÃO DO JPA / HIBERNATE (Ajustado para Spring Boot 2.5.x)
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
# Linha importante para a versão 2.5.6:
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL9Dialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=true

# Otimizações para processamento em lote (Batch)
spring.jpa.properties.hibernate.jdbc.batch_size=4
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.transaction.rollback-on-commit-failure=true

# ===================================================================
# CONFIGURAÇÃO DO SERVIDOR & CONTEXTO
# ===================================================================
server.servlet.context-path=/loja_virtual_mentoria
server.http2.enabled=true

# Comentado para poupar memória RAM no ambiente local. 
# Só reative se for fazer testes de estresse massivos na sua máquina.
# server.tomcat.max-connections=50000
# server.tomcat.threads.min-spare=1000

# ===================================================================
# UPLOAD DE ARQUIVOS (MULTIPART)
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10000KB
spring.servlet.multipart.max-request-size=10000KB

# ===================================================================
# COMPRESSÃO DE DADOS (GZIP)
# ===================================================================
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,text
server.compression.min-response-size=1024

# ===================================================================
# CODIFICAÇÃO (ENCODING UTF-8)
# ===================================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ===================================================================
# OUTRAS CONFIGURAÇÕES
# ===================================================================
spring.session.jdbc.cleanup-cron=0 0 4 * * *
spring.mvc.static-path-pattern=/resources/static/**


spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=1
spring.flyway.sql-migration-prefix=V
spring.flyway.sql-migration-separator=__
spring.flyway.sql-migration-suffixes=.sql